    const loadSingleFile = (onSingleFile) => {
      return async function (e) {
        if (e.currentTarget.files.length > 1) {
          throw "Only 1 file"
        } else {
          const arrayBuffer = await new Promise((res) => {
            const reader = new FileReader();
            reader.onload = (event) => {
              res(event.target.result);
            }
            reader.readAsArrayBuffer(e.currentTarget.files[0]);
          });

          onSingleFile(arrayBuffer);
        }
      }
    }

    const loadMultipleFiles = (onMultipleFiles) => {
      return async function (e) {
        const arrayBufferList = await Promise.all(Array.from(e.currentTarget.files).map(file => {
          return new Promise((res) => {
            const reader = new FileReader();
            reader.onload = (event) => {
              res(event.target.result);
            }
            reader.readAsArrayBuffer(file);
          });
        }));
        onMultipleFiles(arrayBufferList);
      }
    }

    audioFileInputElement.addEventListener("change", loadSingleFile(async file => audioFileArrayBuffer = file), false);
    irFileInputElement.addEventListener("change", loadMultipleFiles(async files => irFilesArrayBufferList = files), false);

    // input: file / stream
    // output: live playback / file

    function generateDistortionCurve(amount = 20, samples = 4096) {
      const k = typeof amount === 'number' ? amount : 20;
      const curve = new Float32Array(samples);
      const deg = Math.PI / 180;
      for (let i = 0; i < samples; ++i) {
          const x = (i * 2) / samples - 1;
          // soft clipping curve (tanh-like) blended with atan for variety
          curve[i] = (Math.atan(k * x) + Math.tanh(k * x)) * 0.5;
        }
        return curve;
      }

      function scaleAudioBuffer(audioContext, buffer, scale) {
        const newBuf = audioContext.createBuffer(buffer.numberOfChannels, buffer.length, buffer.sampleRate);
        for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
          const src = buffer.getChannelData(ch);
          const dst = newBuf.getChannelData(ch);
          for (let i = 0; i < src.length; i++) dst[i] = src[i] * scale;
        }
        return newBuf;
      }

    async function playDistortedFile(audioFileArrayBuffer, irFilesArrayBufferList) {
      // 1. Initialize Audio Context
      const audioContext = new AudioContext();

      // 3. Load the AudioWorklet processor file
      await audioContext.audioWorklet.addModule('distortion-processor.js');
      const distortionNode = new AudioWorkletNode(audioContext, 'distortion-processor');

      const audioBuffer = await audioContext.decodeAudioData(audioFileArrayBuffer.slice(0));

      // 4. Create the audio nodes
      const sourceNode = audioContext.createBufferSource();
      sourceNode.buffer = audioBuffer;

      const irAudioBufferList = await Promise.all(irFilesArrayBufferList.map(irFilesArrayBuffer => {
        return audioContext.decodeAudioData(irFilesArrayBuffer.slice(0));
      }));
      const cabIR = irAudioBufferList[0]; // pick first IR (tweak as desired)

      let convolver = audioContext.createConvolver();
      convolver.normalize = false; // we control IR gain ourselves
      // scale IR if it's too quiet (tweak factor)
      convolver.buffer = cabIR;// scaleAudioBuffer(audioContext, cabIR, 4.0);


            // AMP HEAD (preamp + waveshaper + tone stack + presence)
      const preGain = audioContext.createGain(); // input to amp head

    async function recordDistortedFile(audioFileUrl) {
      // 1. Initialize Audio Context
      const audioContext = new AudioContext();

      // 2. Load and decode your audio file
      const response = await fetch(audioFileUrl);
      const arrayBuffer = await response.arrayBuffer();
      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

      // 3. Load the AudioWorklet processor file
      await audioContext.audioWorklet.addModule('distortion-processor.js');

      // 4. Create the nodes
      const sourceNode = audioContext.createBufferSource();
      const distortionNode = new AudioWorkletNode(audioContext, 'distortion-processor');

      // Create a destination node for recording
      const recordDestination = audioContext.createMediaStreamDestination();

      sourceNode.buffer = audioBuffer;

      // 5. Connect the audio graph
      sourceNode.connect(distortionNode);

      // Route distortion output to BOTH the speakers and the recorder
      distortionNode.connect(audioContext.destination);
      distortionNode.connect(recordDestination);

      // 6. Set up the MediaRecorder to capture the stream
      const mediaRecorder = new MediaRecorder(recordDestination.stream);
      const audioChunks = [];

      // Collect audio data packets as they are processed
      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          audioChunks.push(event.data);
        }
      };

      // Convert all collected packets into a single Blob when done
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

        // Create a temporary link to download the file
        const audioUrl = URL.createObjectURL(audioBlob);
        const link = document.createElement('a');
        link.href = audioUrl;
        link.download = 'distorted-guitar.webm';
        link.click();
      };

      // 7. Start recording and playback simultaneously
      mediaRecorder.start();
      sourceNode.start();

      // Automatically stop recording when the file finishes playing
      sourceNode.onended = () => {
        mediaRecorder.stop();
        audioContext.close();
      };
    }

    async function processOfflineDistortion(arrayBuffer) {
      // Temporary context just to decode the metadata
      const tempContext = new AudioContext();
      const audioBuffer = await tempContext.decodeAudioData(arrayBuffer);
      tempContext.close();

      // 2. Initialize OfflineAudioContext using the exact file specs
      const offlineContext = new OfflineAudioContext(
        audioBuffer.numberOfChannels,
        audioBuffer.length,
        audioBuffer.sampleRate
      );

      // 3. Load the AudioWorklet into the offline context
      await offlineContext.audioWorklet.addModule('distortion-processor.js');

      // 4. Create and connect nodes inside the offline graph
      const sourceNode = offlineContext.createBufferSource();
      const distortionNode = new AudioWorkletNode(offlineContext, 'distortion-processor');

      sourceNode.buffer = audioBuffer;

      // Connect source -> distortion -> offline destination
      sourceNode.connect(distortionNode);
      distortionNode.connect(offlineContext.destination);

      // Start the source immediately at time 0
      sourceNode.start(0);

      // 5. Render the audio at maximum CPU speed
      console.time('Offline Render Time');
      const renderedBuffer = await offlineContext.startRendering();
      console.timeEnd('Offline Render Time');

      // 6. Convert the rendered AudioBuffer to a WAV Blob and download
      const wav = audioBufferToWav(renderedBuffer, { float32: true });

      var wavBlob = new window.Blob([new DataView(wav)], {
        type: 'audio/wav'
      });

      const downloadUrl = URL.createObjectURL(wavBlob);

      const link = document.createElement('a');
      link.href = downloadUrl;
      link.download = 'distorted-fast.wav';
      link.click();
    }
